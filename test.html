<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Test Page</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid #d8e0ee;
        border-radius: 8px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 14px 40px rgb(23 32 51 / 12%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 20px;
        color: #526070;
        line-height: 1.6;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        margin: 20px 0;
        padding: 12px 14px;
        border: 1px solid #d8e0ee;
        border-radius: 8px;
        background: #f8fafc;
        font-size: 15px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #25a55f;
      }

      button {
        width: 100%;
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        background: #2557d6;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #1f49b5;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #101622;
          color: #eef4ff;
        }

        main {
          border-color: #293247;
          background: #172033;
          box-shadow: none;
        }

        p {
          color: #aeb9ca;
        }

        .status {
          border-color: #293247;
          background: #111827;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Simple Test Page</h1>
      <p>
        This standalone HTML file is ready for quick browser checks. Click the
        button to confirm JavaScript is running.
      </p>

      <div class="status" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span id="statusText">Page loaded successfully.</span>
      </div>

      <button type="button" id="testButton">Run Test</button>
    </main>

    <script>
      const button = document.querySelector("#testButton");
      const statusText = document.querySelector("#statusText");
      let count = 0;

      button.addEventListener("click", () => {
        count += 1;
        statusText.textContent = `JavaScript works. Test clicked ${count} time${
          count === 1 ? "" : "s"
        }.`;
      });
    </script>
  </body>
</html>
